<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FZG 專案追蹤器</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#a371f7}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:16px;min-height:100vh}
header{max-width:1200px;margin:0 auto 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
h1{font-size:1.4em;color:var(--accent)}
.toolbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.btn{border:none;border-radius:6px;padding:7px 12px;cursor:pointer;font-size:0.8em}
.btn-green{background:var(--green);color:#fff}
.btn-tab{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:6px 12px}
.btn-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.search-box{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:0.8em;width:150px}
.month-nav{display:flex;align-items:center;gap:6px}
.month-nav button{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:6px;cursor:pointer}
.month-nav span{font-size:0.8em;min-width:90px;text-align:center}
.filter-bar{max-width:1200px;margin:0 auto 12px;display:flex;gap:6px;flex-wrap:wrap}
.filter-tag{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:3px 10px;font-size:0.7em;cursor:pointer}
.filter-tag.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.stats{max-width:1200px;margin:0 auto 16px;display:flex;gap:10px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.stat .num{font-size:1.3em;font-weight:700}
.stat .label{font-size:0.7em;color:var(--muted)}
.board{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.column{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;min-height:200px}
.column h3{font-size:0.8em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px;margin-bottom:7px;cursor:pointer;transition:border-color .2s}
.card:hover{border-color:var(--accent)}
.card .name{font-weight:600;font-size:0.8em;margin-bottom:3px}
.card .meta{font-size:0.65em;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
.card .progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:5px}
.card .progress-fill{height:100%;border-radius:2px;background:var(--accent)}
.card .tags{margin-top:4px;display:flex;gap:3px;flex-wrap:wrap}
.card .tag-pill{font-size:0.6em;padding:1px 6px;border-radius:8px;background:var(--surface);border:1px solid var(--border)}
.card .subtasks{font-size:0.6em;color:var(--muted);margin-top:3px}
.priority-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.p-high{background:var(--red)}
.p-mid{background:var(--yellow)}
.p-low{background:var(--green)}
.timeline{max-width:1200px;margin:0 auto}
.report{max-width:800px;margin:0 auto}
.report-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.report-section h3{font-size:0.85em;margin-bottom:8px;color:var(--accent)}
.overdue{color:var(--red)}
.hidden{display:none!important}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100}
.modal-content{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;width:90%;max-width:420px;display:flex;flex-direction:column;gap:8px;max-height:90vh;overflow-y:auto}
.modal-content h3{color:var(--accent)}
.modal-content input,.modal-content select,.modal-content textarea{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:0.85em}
.modal-actions{display:flex;gap:6px;margin-top:6px}
.modal-actions button{flex:1;padding:9px;border:none;border-radius:6px;cursor:pointer;font-size:0.85em;background:var(--accent);color:#fff}
.modal-actions .cancel{background:var(--border);color:var(--text)}
.modal-actions .del{background:var(--red);color:#fff}
@media(max-width:768px){.board{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>📋 FZG 專案追蹤器</h1>
  <div class="toolbar">
    <button class="btn btn-green" onclick="openModal()">➕ 新增</button>
    <input class="search-box" id="search" placeholder="🔍 搜尋..." oninput="render()"/>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">◀</button>
      <span id="monthLabel"></span>
      <button onclick="changeMonth(1)">▶</button>
    </div>
    <button class="btn-tab active" data-view="board" onclick="switchView(this)">看板</button>
    <button class="btn-tab" data-view="timeline" onclick="switchView(this)">時間軸</button>
    <button class="btn-tab" data-view="report" onclick="switchView(this)">報告</button>
    <button class="btn-tab" data-view="outsource" onclick="switchView(this)">外包</button>
  </div>
</header>
<div class="filter-bar" id="filterBar"></div>
<div class="stats" id="stats"></div>
<div id="boardView" class="board"></div>
<div id="timelineView" class="timeline hidden"></div>
<div id="reportView" class="report hidden"></div>
<div id="outsourceView" class="board hidden"></div>
<div id="addModal" class="modal hidden">
  <div class="modal-content">
    <h3 id="modalTitle">➕ 新增任務</h3>
    <label style="font-size:0.75em;color:var(--muted)">任務名稱</label>
    <input id="f-name" />
    <label style="font-size:0.75em;color:var(--muted)">負責人</label>
    <div style="display:flex;gap:4px"><input id="f-owner" style="flex:1"/><select id="f-owner-select" onchange="onOwnerSelect()" style="width:auto"></select></div>
    <label style="font-size:0.75em;color:var(--muted)">狀態</label>
    <select id="f-status"><option>待辦</option><option>進行中</option><option>已完成</option></select>
    <label style="font-size:0.75em;color:var(--muted)">優先級</label>
    <select id="f-priority"><option value="">無優先級</option><option value="高">高</option><option value="中">中</option><option value="低">低</option></select>
    <label style="font-size:0.75em;color:var(--muted)">開始日期</label>
    <input id="f-start" type="date" style="width:100%" onclick="this.showPicker()" />
    <label style="font-size:0.75em;color:var(--muted)">截止日期</label>
    <input id="f-due" type="date" style="width:100%" onclick="this.showPicker()" />
    <label style="font-size:0.75em;color:var(--muted)">標籤</label>
    <div style="display:flex;gap:4px"><input id="f-tags" style="flex:1"/><select id="f-tags-select" onchange="onTagSelect()" style="width:auto"></select></div>
    <label style="font-size:0.75em;color:var(--muted)">父任務</label>
    <div style="display:flex;gap:4px"><input id="f-parent" style="flex:1"/><select id="f-parent-select" onchange="onParentSelect()" style="width:auto"></select></div>
    <label style="font-size:0.75em;color:var(--muted)">備註</label>
    <input id="f-note" />
    <div class="modal-actions">
      <button onclick="submitTask()">確認</button>
      <button onclick="deleteTask()" class="del" id="deleteBtn" style="display:none">刪除</button>
      <button onclick="closeModal()" class="cancel">取消</button>
    </div>
  </div>
</div>
<script>
const SHEET_ID='142VCJ65sgkzmELIy6ImUFD8z2RXQRwVs-YvkWnPCF2s';
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbyNevW7oTS-hKWXTkFknvQfVmai9pqlkUXmU9viGTPHDqs261F312cvY_JMEGwOrt_4/exec';
const CSV_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1`;
let tasks=[],currentMonth=new Date(),activeFilter='';
function switchView(el){
  document.querySelectorAll('.btn-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const v=el.dataset.view;
  document.getElementById('boardView').classList.toggle('hidden',v!=='board');
  document.getElementById('timelineView').classList.toggle('hidden',v!=='timeline');
  document.getElementById('reportView').classList.toggle('hidden',v!=='report');
  document.getElementById('outsourceView').classList.toggle('hidden',v!=='outsource');
  if(v==='outsource')renderOutsource();
}
function openModal(idx){
  const m=document.getElementById('addModal');m.classList.remove('hidden');
  populateSelects();
  document.getElementById('deleteBtn').style.display=idx!==undefined?'block':'none';
  document.getElementById('modalTitle').textContent=idx!==undefined?'✏️ 編輯任務':'➕ 新增任務';
  if(idx!==undefined){
    const t=tasks[idx];
    document.getElementById('f-name').value=t['任務名稱']||'';
    document.getElementById('f-owner').value=t['負責人']||'';
    document.getElementById('f-status').value=t['狀態']||'待辦';
    document.getElementById('f-priority').value=t['優先級']||'';
    const sd=t['開始日']||'';document.getElementById('f-start').value=sd.length>=10?sd.substring(0,10):'';
    const ed=t['截止日']||'';document.getElementById('f-due').value=ed.length>=10?ed.substring(0,10):'';
    document.getElementById('f-tags').value=t['標籤']||'';
    document.getElementById('f-parent').value=t['父任務']||'';
    document.getElementById('f-note').value=t['備註']||'';
    m.dataset.editIdx=idx;
  }else{
    ['f-name','f-owner','f-tags','f-parent','f-note'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-status').value='待辦';document.getElementById('f-priority').value='';document.getElementById('f-start').value='';document.getElementById('f-due').value='';
    delete m.dataset.editIdx;
  }
}
function closeModal(){document.getElementById('addModal').classList.add('hidden')}
function openModalWithParent(parentName){
  openModal();
  document.getElementById('f-parent').value=parentName;
}
function populateSelects(){
  const allTags=new Set();tasks.forEach(t=>(t['標籤']||'').split(',').filter(Boolean).forEach(tag=>allTags.add(tag.trim())));
  const tagSel=document.getElementById('f-tags-select');
  tagSel.innerHTML='<option value="">選擇...</option>'+[...allTags].map(t=>`<option value="${t}">${t}</option>`).join('')+'<option value="__new">+ 新增</option>';
  const parentSel=document.getElementById('f-parent-select');
  const getTaskLevel=(t)=>{if(!t['父任務'])return 0;const p=tasks.find(x=>x['任務名稱']===t['父任務']);if(!p||!p['父任務'])return 1;return 2};
  const parentNames=tasks.filter(t=>getTaskLevel(t)<2).map(t=>t['任務名稱']).filter(Boolean);
  parentSel.innerHTML='<option value="">選擇...</option>'+[...new Set(parentNames)].map(n=>`<option value="${n}">${n}</option>`).join('')+'<option value="__new">+ 新增</option>';
  const ownerSel=document.getElementById('f-owner-select');
  const owners=[...new Set(tasks.map(t=>t['負責人']).filter(Boolean))];
  ownerSel.innerHTML='<option value="">選擇...</option>'+owners.map(o=>`<option value="${o}">${o}</option>`).join('')+'<option value="__new">+ 新增</option>';
}
function onTagSelect(){
  const sel=document.getElementById('f-tags-select');
  const input=document.getElementById('f-tags');
  if(sel.value==='__new'){const v=prompt('輸入新標籤名稱：');if(v){input.value=input.value?(input.value+','+v):v}sel.value=''}
  else if(sel.value){const cur=input.value?input.value.split(',').map(s=>s.trim()):[];if(!cur.includes(sel.value))cur.push(sel.value);input.value=cur.join(',');sel.value=''}
}
function onParentSelect(){
  const sel=document.getElementById('f-parent-select');
  const input=document.getElementById('f-parent');
  if(sel.value==='__new'){const v=prompt('輸入父任務名稱：');if(v)input.value=v;sel.value=''}
  else if(sel.value){input.value=sel.value;sel.value=''}
}
function onOwnerSelect(){
  const sel=document.getElementById('f-owner-select');
  const input=document.getElementById('f-owner');
  if(sel.value==='__new'){const v=prompt('輸入新負責人名稱：');if(v)input.value=v;sel.value=''}
  else if(sel.value){input.value=sel.value;sel.value=''}
}
function changeMonth(dir){currentMonth.setMonth(currentMonth.getMonth()+dir);updateMonthLabel();render()}
function updateMonthLabel(){document.getElementById('monthLabel').textContent=currentMonth.getFullYear()+'/'+(currentMonth.getMonth()+1)}
function filterByMonth(list){
  const y=currentMonth.getFullYear(),m=currentMonth.getMonth()+1,prefix=y+'-'+(m<10?'0'+m:m);
  return list.filter(t=>{
    if(!t['開始日']&&!t['截止日'])return true;
    if(t['開始日']&&t['開始日'].startsWith(prefix))return true;
    if(t['截止日']&&t['截止日'].startsWith(prefix))return true;
    if(t['開始日']&&t['截止日'])return t['開始日'].substring(0,7)<=prefix&&t['截止日'].substring(0,7)>=prefix;
    return false;
  });
}
function getFiltered(){
  let list=filterByMonth(tasks);
  const q=document.getElementById('search').value.toLowerCase();
  if(q)list=list.filter(t=>Object.values(t).join(' ').toLowerCase().includes(q));
  if(activeFilter)list=list.filter(t=>(t['標籤']||'').includes(activeFilter));
  return list;
}
async function submitTask(){
  const m=document.getElementById('addModal');
  const data={name:document.getElementById('f-name').value,owner:document.getElementById('f-owner').value,status:document.getElementById('f-status').value,progress:'',startDate:document.getElementById('f-start').value,dueDate:document.getElementById('f-due').value,note:document.getElementById('f-note').value,priority:document.getElementById('f-priority').value,tags:document.getElementById('f-tags').value,parent:document.getElementById('f-parent').value};
  if(!data.name){alert('請填寫任務名稱');return}
  if(m.dataset.editIdx!==undefined){data.action='update';data.row=m.dataset.editIdx}
  try{await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(data),mode:'no-cors'});alert('✅ 完成！');closeModal();setTimeout(()=>location.reload(),2000)}catch(e){alert('❌ 失敗')}
}
async function deleteTask(){
  const m=document.getElementById('addModal');
  if(!confirm('確定刪除？'))return;
  try{await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'delete',row:m.dataset.editIdx}),mode:'no-cors'});alert('✅ 已刪除');closeModal();setTimeout(()=>location.reload(),2000)}catch(e){alert('❌ 失敗')}
}
async function fetchData(){
  try{
    const res=await fetch(CSV_URL);const text=await res.text();
    const json=JSON.parse(text.substring(47).slice(0,-2));
    const cols=json.table.cols.map(c=>c.label.trim());
    tasks=json.table.rows.map(r=>{const obj={};cols.forEach((c,i)=>{if(r.c&&r.c[i])obj[c]=r.c[i].f||String(r.c[i].v||'');else obj[c]=''});return obj}).filter(t=>t['任務名稱']);
    render();renderFilterBar();
  }catch(e){document.getElementById('boardView').innerHTML='<div style="text-align:center;color:var(--muted);padding:40px">無法載入資料</div>'}
}
function renderFilterBar(){
  const allTags=new Set();tasks.forEach(t=>(t['標籤']||'').split(',').filter(Boolean).forEach(tag=>allTags.add(tag.trim())));
  if(!allTags.size){document.getElementById('filterBar').innerHTML='';return}
  let html=`<span class="filter-tag ${!activeFilter?'active':''}" onclick="activeFilter='';render();renderFilterBar()">全部</span>`;
  allTags.forEach(tag=>{html+=`<span class="filter-tag ${activeFilter===tag?'active':''}" onclick="activeFilter='${tag}';render();renderFilterBar()">${tag}</span>`});
  document.getElementById('filterBar').innerHTML=html;
}
function render(){renderStats();renderBoard();renderTimeline();renderReport()}
function renderStats(){
  const f=getFiltered(),total=f.length,done=f.filter(t=>t['狀態']==='已完成').length;
  document.getElementById('stats').innerHTML=`<div class="stat"><div class="num">${total}</div><div class="label">任務</div></div><div class="stat"><div class="num" style="color:var(--green)">${done}</div><div class="label">完成</div></div><div class="stat"><div class="num" style="color:var(--yellow)">${total-done}</div><div class="label">未完成</div></div>`;
}
function renderBoard(){
  const filtered=getFiltered();
  const parentTasks=filtered.filter(t=>!t['父任務']);
  const getChildren=name=>filtered.filter(t=>t['父任務']===name);
  const todo=parentTasks.filter(t=>t['狀態']==='待辦');
  const doing=parentTasks.filter(t=>t['狀態']==='進行中');
  const done=parentTasks.filter(t=>t['狀態']==='已完成');
  const getLevel=(t)=>{if(!t['父任務'])return 0;const p=tasks.find(x=>x['任務名稱']===t['父任務']);if(!p||!p['父任務'])return 1;return 2};
  const cardHtml=(items)=>items.map(t=>{
    const idx=tasks.indexOf(t);
    const pClass=t['優先級']==='高'?'p-high':t['優先級']==='中'?'p-mid':t['優先級']==='低'?'p-low':'';
    const children=getChildren(t['任務名稱']);
    const childDone=children.filter(c=>c['狀態']==='已完成').length;
    const tags=(t['標籤']||'').split(',').filter(Boolean);
    const level=getLevel(t);
    const canAddSub=level<2;
    return `<div class="card" onclick="openModal(${idx})" draggable="true" ondragstart="drag(event,${idx})" style="position:relative">
      ${canAddSub?`<span onclick="event.stopPropagation();openModalWithParent('${t['任務名稱'].replace(/'/g,"\\'")}')" style="position:absolute;top:6px;right:6px;font-size:0.6em;background:var(--accent);color:#fff;border-radius:4px;padding:2px 6px;cursor:pointer">+子任務</span>`:''}
      <div class="name">${pClass?'<span class="priority-dot '+pClass+'"></span>':''}${t['任務名稱']}</div>
      <div class="meta"><span>${t['負責人']||''}</span><span>${t['開始日']?t['開始日'].substring(0,10):''}${t['開始日']||t['截止日']?' ~ ':''}${t['截止日']?t['截止日'].substring(0,10):''}</span></div>
      ${tags.length?'<div class="tags">'+tags.map(tg=>'<span class="tag-pill">'+tg.trim()+'</span>').join('')+'</div>':''}
      ${children.length?'<div class="subtasks">子任務：'+childDone+'/'+children.length+'<div style="margin-top:4px">'+children.map(c=>{
        const ci=tasks.indexOf(c);const cpClass=c['優先級']==='高'?'p-high':c['優先級']==='中'?'p-mid':c['優先級']==='低'?'p-low':'';
        const grandChildren=getChildren(c['任務名稱']);const gcDone=grandChildren.filter(g=>g['狀態']==='已完成').length;
        const cLevel=getLevel(c);const cCanAddSub=cLevel<2;
        return `<div style="border:1px solid var(--border);border-radius:6px;margin-bottom:4px;background:var(--surface);padding:6px 8px">
          <div onclick="event.stopPropagation();openModal(${ci})" style="display:flex;align-items:center;gap:4px;font-size:0.7em;cursor:pointer">
            <span style="color:${c['狀態']==='已完成'?'var(--green)':'var(--muted)'}">${c['狀態']==='已完成'?'✅':'⬜'}</span>
            ${cpClass?'<span class="priority-dot '+cpClass+'"></span>':''}
            <span style="flex:1">${c['任務名稱']}</span>
            <span style="color:var(--muted);font-size:0.9em">${c['開始日']?c['開始日'].substring(5,10):''}${c['開始日']||c['截止日']?'~':''}${c['截止日']?c['截止日'].substring(5,10):''}</span>
            ${cCanAddSub?`<span onclick="event.stopPropagation();openModalWithParent('${c['任務名稱'].replace(/'/g,"\\'")}')" style="font-size:0.85em;background:var(--accent);color:#fff;border-radius:3px;padding:1px 4px;cursor:pointer;margin-left:4px">+</span>`:''}
          </div>
          ${grandChildren.length?'<div style="margin-top:4px;padding-left:12px">'+grandChildren.map(g=>{
            const gi=tasks.indexOf(g);const gpClass=g['優先級']==='高'?'p-high':g['優先級']==='中'?'p-mid':g['優先級']==='低'?'p-low':'';
            return `<div onclick="event.stopPropagation();openModal(${gi})" style="display:flex;align-items:center;gap:4px;padding:3px 6px;font-size:0.65em;cursor:pointer;border:1px solid var(--border);border-radius:4px;margin-bottom:3px;background:var(--bg)">
              <span style="color:${g['狀態']==='已完成'?'var(--green)':'var(--muted)'}">${g['狀態']==='已完成'?'✅':'⬜'}</span>
              ${gpClass?'<span class="priority-dot '+gpClass+'"></span>':''}
              <span style="flex:1">${g['任務名稱']}</span>
              <span style="color:var(--muted)">${g['開始日']?g['開始日'].substring(5,10):''}${g['開始日']||g['截止日']?'~':''}${g['截止日']?g['截止日'].substring(5,10):''}</span>
            </div>`}).join('')+'</div>':''}
        </div>`}).join('')+'</div></div>':''}
    </div>`}).join('');
  const groupByOwner=(items)=>{
    const groups={};
    items.forEach(t=>{const o=t['負責人']||'未指派';if(!groups[o])groups[o]=[];groups[o].push(t)});
    return Object.entries(groups).map(([owner,list])=>`<div style="margin-bottom:8px"><div style="font-size:0.7em;color:var(--accent);padding:4px 0;border-bottom:1px solid var(--border);margin-bottom:4px">👤 ${owner}</div>${cardHtml(list)}</div>`).join('');
  };
  document.getElementById('boardView').innerHTML=`
    <div class="column" ondragover="event.preventDefault()" ondrop="drop(event,'待辦')"><h3 style="color:var(--muted)">📝 待辦 (${todo.length})</h3>${todo.length?groupByOwner(todo):'<div style="text-align:center;color:var(--muted);padding:20px">無任務</div>'}</div>
    <div class="column" ondragover="event.preventDefault()" ondrop="drop(event,'進行中')"><h3 style="color:var(--yellow)">🔄 進行中 (${doing.length})</h3>${doing.length?groupByOwner(doing):'<div style="text-align:center;color:var(--muted);padding:20px">無任務</div>'}</div>
    <div class="column" ondragover="event.preventDefault()" ondrop="drop(event,'已完成')"><h3 style="color:var(--green)">✅ 已完成 (${done.length})</h3>${done.length?groupByOwner(done):'<div style="text-align:center;color:var(--muted);padding:20px">無任務</div>'}</div>`;
}
let dragIdx=null;
function drag(e,idx){dragIdx=idx;e.dataTransfer.effectAllowed='move'}
function drop(e,status){
  e.preventDefault();if(dragIdx===null)return;
  const t=tasks[dragIdx];
  const data={action:'update',row:dragIdx,name:t['任務名稱'],owner:t['負責人'],status:status,progress:'',startDate:t['開始日'],dueDate:t['截止日'],note:t['備註'],priority:t['優先級'],tags:t['標籤'],parent:t['父任務']};
  fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(data),mode:'no-cors'});
  t['狀態']=status;render();dragIdx=null;
}
function renderTimeline(){
  const filtered=getFiltered();
  if(!filtered.length){document.getElementById('timelineView').innerHTML='<div style="text-align:center;color:var(--muted);padding:40px">本月無任務</div>';return}
  const y=currentMonth.getFullYear(),m=currentMonth.getMonth();
  const days=new Date(y,m+1,0).getDate();
  let h='<div style="display:flex;border-bottom:1px solid var(--border);padding:4px 0;margin-bottom:6px"><div style="width:130px;flex-shrink:0;font-size:0.65em;color:var(--muted)">任務</div><div style="flex:1;display:flex">';
  for(let d=1;d<=days;d++)h+=`<div style="flex:1;text-align:center;font-size:0.55em;color:var(--muted)">${d}</div>`;
  h+='</div></div>';
  filtered.forEach(t=>{
    const s=t['開始日']?new Date(t['開始日']):new Date(y,m,1),e=t['截止日']?new Date(t['截止日']):new Date(y,m,days);
    let sd=s.getMonth()===m&&s.getFullYear()===y?s.getDate():1;
    let ed=e.getMonth()===m&&e.getFullYear()===y?e.getDate():days;
    const color=t['狀態']==='已完成'?'var(--green)':t['狀態']==='進行中'?'var(--yellow)':'var(--muted)';
    const l=((sd-1)/days*100).toFixed(1),w=((ed-sd+1)/days*100).toFixed(1);
    const pClass=t['優先級']==='高'?'p-high':t['優先級']==='中'?'p-mid':'';
    h+=`<div style="display:flex;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)"><div style="width:130px;flex-shrink:0;font-size:0.7em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${pClass?'<span class="priority-dot '+pClass+'"></span>':''}${t['任務名稱']}</div><div style="flex:1;position:relative;height:18px;background:var(--bg);border-radius:3px"><div style="position:absolute;left:${l}%;width:${w}%;height:100%;background:${color};border-radius:3px;opacity:0.8"></div></div></div>`;
  });
  document.getElementById('timelineView').innerHTML=h;
}
function renderReport(){
  const filtered=getFiltered(),total=filtered.length,done=filtered.filter(t=>t['狀態']==='已完成').length;
  const today=new Date().toISOString().split('T')[0];
  const overdue=filtered.filter(t=>t['狀態']!=='已完成'&&t['截止日']&&t['截止日']<today);
  let html=`<div class="report-section"><h3>📊 整體進度</h3><p>完成率：${total?Math.round(done/total*100):0}%（${done}/${total}）</p></div>`;
  const ownerMap={};filtered.forEach(t=>{const o=t['負責人']||'未指派';if(!ownerMap[o])ownerMap[o]={total:0,done:0,doing:0,todo:0};ownerMap[o].total++;if(t['狀態']==='已完成')ownerMap[o].done++;else if(t['狀態']==='進行中')ownerMap[o].doing++;else ownerMap[o].todo++});
  if(Object.keys(ownerMap).length){html+=`<div class="report-section"><h3>👤 各負責人工作數量</h3>`;Object.entries(ownerMap).forEach(([n,d])=>{html+=`<p style="margin-bottom:4px">• <strong>${n}</strong>：共${d.total}項（待辦${d.todo}/進行中${d.doing}/完成${d.done}）</p>`});html+=`</div>`}
  if(overdue.length)html+=`<div class="report-section"><h3>⚠️ 逾期任務</h3>${overdue.map(t=>`<p class="overdue">• ${t['任務名稱']}（截止：${t['截止日']}）</p>`).join('')}</div>`;
  document.getElementById('reportView').innerHTML=html;
}
const OUTSOURCE_SHEET_ID='11cuSAO3MZfUmau1pd603685i18d0SlQKN-h--jUrp2s';
const OUTSOURCE_URL=`https://docs.google.com/spreadsheets/d/${OUTSOURCE_SHEET_ID}/gviz/tq?tqx=out:json&headers=1`;
let outsourceTasks=[];
async function fetchOutsource(){
  try{
    const res=await fetch(OUTSOURCE_URL);const text=await res.text();
    const json=JSON.parse(text.substring(47).slice(0,-2));
    const cols=json.table.cols.map(c=>c.label.trim());
    outsourceTasks=json.table.rows.map(r=>{const obj={};cols.forEach((c,i)=>{if(r.c&&r.c[i])obj[c]=r.c[i].f||String(r.c[i].v||'');else obj[c]=''});return obj}).filter(t=>t['工作項目']);
  }catch(e){}
}
function renderOutsource(){
  if(!outsourceTasks.length){document.getElementById('outsourceView').innerHTML='<div style="text-align:center;color:var(--muted);padding:40px;grid-column:1/-1">載入中...</div>';fetchOutsource().then(()=>renderOutsource());return}
  const owners={};
  outsourceTasks.forEach(t=>{const o=t['負責人']||'未指派';if(!owners[o])owners[o]=[];owners[o].push(t)});
  let html='';
  Object.entries(owners).forEach(([owner,items])=>{
    const done=items.filter(t=>t['狀態']==='已完成').length;
    const doing=items.filter(t=>t['狀態']==='進行中').length;
    html+=`<div class="column"><h3 style="color:var(--accent)">👤 ${owner} <span style="font-weight:normal;font-size:0.85em;color:var(--muted)">(${done}/${items.length}完成)</span></h3>`;
    items.forEach(t=>{
      const statusIcon=t['狀態']==='已完成'?'✅':t['狀態']==='進行中'?'🔄':'📝';
      const statusColor=t['狀態']==='已完成'?'var(--green)':t['狀態']==='進行中'?'var(--yellow)':'var(--muted)';
      html+=`<div class="card" style="cursor:default"><div class="name" style="color:${statusColor}">${statusIcon} ${t['工作項目']}</div><div class="meta"><span>${t['狀態']}</span><span>${t['開始日']?t['開始日'].substring(0,10):''}${t['開始日']&&t['截止日']?' ~ ':''}${t['截止日']?t['截止日'].substring(0,10):''}</span></div>${t['備註']?'<div style="font-size:0.65em;color:var(--muted);margin-top:3px">'+t['備註']+'</div>':''}</div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('outsourceView').innerHTML=html;
}
fetchData();updateMonthLabel();
</script>
