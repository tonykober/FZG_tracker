<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FZG 專案追蹤器</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header style="max-width:1200px;margin:0 auto 16px;display:flex;align-items:center;flex-wrap:wrap;gap:8px">
  <h1 onclick="location.reload()" style="cursor:pointer;font-size:1.4em" title="點擊刷新頁面">📋 FZG 專案追蹤器</h1>
  <div style="display:flex;gap:6px;align-items:center;margin:0 auto">
    <button class="btn-tab active" id="mainTabInternal" onclick="switchMainTab('internal')">內部</button>
    <button class="btn-tab" id="mainTabOutsource" onclick="switchMainTab('outsource')">外包</button>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">◀</button>
      <span id="monthLabel"></span>
      <input type="month" id="monthPicker" style="position:absolute;opacity:0;width:0;height:0" onchange="jumpToMonth(this.value)">
      <button onclick="changeMonth(1)">▶</button>
    </div>
  </div>
  <div style="display:flex;gap:4px;align-items:center">
    <input id="adminPw" type="password" placeholder="密碼" style="width:60px;padding:4px 6px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:0.875rem">
    <button onclick="toggleAdmin()" class="btn" style="background:var(--accent);color:#fff;font-size:0.875rem" id="adminBtn">管理</button>
  </div>
</header>
<div id="internalSection">
  <div style="max-width:1200px;margin:24px auto 8px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
    <div class="stats" id="stats" style="margin:0;flex-shrink:0"></div>
    <div id="monthNotes" style="flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:1rem;color:var(--accent);font-weight:600">📌 當月要點</span>
        <button class="edit-ctrl" onclick="saveNotes()" style="background:var(--accent);color:#fff;border:none;border-radius:4px;padding:2px 6px;font-size:1rem;cursor:pointer">儲存</button>
      </div>
      <textarea id="notesArea" style="width:100%;min-height:30px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 6px;color:var(--text);font-size:0.875rem;resize:none;overflow:hidden" placeholder="輸入當月要點或備註..." oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    </div>
  </div>
  <div style="max-width:1200px;margin:0 auto 8px;display:flex;align-items:center;flex-wrap:wrap;gap:6px">
    <button class="btn btn-green edit-ctrl" onclick="openModal()">➕ 新增任務</button>
    <div class="filter-bar" id="filterBar" style="flex:1;margin:0"></div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="btn-tab active" data-view="board" onclick="switchView(this)">看板</button>
      <button class="btn-tab" data-view="timeline" onclick="switchView(this)">時間軸</button>
      <button class="btn-tab" data-view="report" onclick="switchView(this)">報告</button>
    </div>
    <input class="search-box" id="search" placeholder="🔍 搜尋..." oninput="render()"/>
  </div>
<div id="boardView" class="board"></div>
<div id="timelineView" class="timeline hidden"></div>
<div id="reportView" class="report hidden"></div>
</div>
<div id="outsourceSection" class="hidden">
  <div style="max-width:1200px;margin:24px auto 8px;display:flex;gap:6px;align-items:center;justify-content:space-between">
    <div style="display:flex;gap:6px">
      <button class="btn-tab active" onclick="outsourceMode='list';renderOutsourceFromCache();this.classList.add('active');this.nextElementSibling.classList.remove('active')">看板</button>
      <button class="btn-tab" onclick="outsourceMode='gantt';renderOutsourceFromCache();this.classList.add('active');this.previousElementSibling.classList.remove('active')">時間軸</button>
      <button class="btn edit-ctrl" onclick="syncOutsource()" style="background:var(--accent);color:#fff">🔄 同步</button>
      <span style="font-size:1rem;color:var(--muted);display:flex;gap:8px;margin-left:8px;align-items:center">🟡進行中 🟢已完成 ⬜待辦 🔵群組</span>
    </div>
    <input class="search-box" id="searchOutsource" placeholder="🔍 搜尋..." oninput="renderOutsourceFromCache()"/>
  </div>
  <div id="outsourceContent"></div>
</div>
<div id="addModal" class="modal hidden">
  <div class="modal-content">
    <h3 id="modalTitle">➕ 新增任務</h3>
    <label style="font-size:0.75em;color:var(--muted)">任務名稱</label>
    <input id="f-name" />
    <label style="font-size:0.75em;color:var(--muted)">負責人</label>
    <div style="display:flex;gap:4px"><input id="f-owner" style="flex:1"/><select id="f-owner-select" onchange="onOwnerSelect()" style="width:auto"></select></div>
    <label style="font-size:0.75em;color:var(--muted)">狀態</label>
    <select id="f-status"><option>待辦</option><option>進行中</option><option>已完成</option></select>
    <label style="font-size:0.75em;color:var(--muted)">優先級</label>
    <select id="f-priority"><option value="">無優先級</option><option value="高">高</option><option value="中">中</option><option value="低">低</option></select>
    <label style="font-size:0.75em;color:var(--muted)">開始日期</label>
    <input id="f-start" type="date" style="width:100%" onclick="this.showPicker()" />
    <label style="font-size:0.75em;color:var(--muted)">截止日期</label>
    <input id="f-due" type="date" style="width:100%" onclick="this.showPicker()" />
    <label style="font-size:0.75em;color:var(--muted)">標籤</label>
    <div style="display:flex;gap:4px"><input id="f-tags" style="flex:1"/><select id="f-tags-select" onchange="onTagSelect()" style="width:auto"></select></div>
    <label style="font-size:0.75em;color:var(--muted)">父任務</label>
    <div style="display:flex;gap:4px"><input id="f-parent" style="flex:1"/><select id="f-parent-select" onchange="onParentSelect()" style="width:auto"></select></div>
    <label style="font-size:0.75em;color:var(--muted)">備註</label>
    <input id="f-note" />
    <label style="font-size:0.75em;color:var(--muted)">工時（小時）</label>
    <input id="f-hours" type="number" min="0" step="0.5" value="0" />
    <label style="font-size:0.75em;color:var(--muted)">評論</label>
    <textarea id="f-comment" style="min-height:40px;resize:vertical"></textarea>
    <div class="modal-actions">
      <button onclick="submitTask()">確認</button>
      <button onclick="deleteTask()" class="del" id="deleteBtn" style="display:none">刪除</button>
      <button onclick="closeModal()" class="cancel">取消</button>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
