<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FZG е°ҲжЎҲиҝҪи№ӨеҷЁ</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#a371f7}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:16px;min-height:100vh}
header{max-width:1200px;margin:0 auto 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
h1{font-size:1.4em;color:var(--accent)}
.toolbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.btn{border:none;border-radius:6px;padding:7px 12px;cursor:pointer;font-size:0.8em}
.btn-green{background:var(--green);color:#fff}
.btn-tab{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:6px 12px}
.btn-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.search-box{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:0.8em;width:150px}
.month-nav{display:flex;align-items:center;gap:6px}
.month-nav button{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:6px;cursor:pointer}
.month-nav span{font-size:0.8em;min-width:90px;text-align:center}
.filter-bar{max-width:1200px;margin:0 auto 12px;display:flex;gap:6px;flex-wrap:wrap}
.filter-tag{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:3px 10px;font-size:0.7em;cursor:pointer}
.filter-tag.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.stats{max-width:1200px;margin:0 auto 16px;display:flex;gap:10px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.stat .num{font-size:1.3em;font-weight:700}
.stat .label{font-size:0.7em;color:var(--muted)}
.board{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.column{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;min-height:200px}
.column h3{font-size:0.8em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px;margin-bottom:7px;cursor:pointer;transition:border-color .2s}
.card:hover{border-color:var(--accent)}
.card .name{font-weight:600;font-size:0.8em;margin-bottom:3px}
.card .meta{font-size:0.65em;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
.card .progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:5px}
.card .progress-fill{height:100%;border-radius:2px;background:var(--accent)}
.card .tags{margin-top:4px;display:flex;gap:3px;flex-wrap:wrap}
.card .tag-pill{font-size:0.6em;padding:1px 6px;border-radius:8px;background:var(--surface);border:1px solid var(--border)}
.card .subtasks{font-size:0.6em;color:var(--muted);margin-top:3px}
.priority-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.p-high{background:var(--red)}
.p-mid{background:var(--yellow)}
.p-low{background:var(--green)}
.timeline{max-width:1200px;margin:0 auto}
.report{max-width:800px;margin:0 auto}
.report-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.report-section h3{font-size:0.85em;margin-bottom:8px;color:var(--accent)}
.overdue{color:var(--red)}
.hidden{display:none!important}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100}
.modal-content{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;width:90%;max-width:420px;display:flex;flex-direction:column;gap:8px;max-height:90vh;overflow-y:auto}
.modal-content h3{color:var(--accent)}
.modal-content input,.modal-content select,.modal-content textarea{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:0.85em}
.modal-actions{display:flex;gap:6px;margin-top:6px}
.modal-actions button{flex:1;padding:9px;border:none;border-radius:6px;cursor:pointer;font-size:0.85em;background:var(--accent);color:#fff}
.modal-actions .cancel{background:var(--border);color:var(--text)}
.modal-actions .del{background:var(--red);color:#fff}
@media(max-width:768px){.board{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>рҹ“Ӣ FZG е°ҲжЎҲиҝҪи№ӨеҷЁ</h1>
  <div class="toolbar">
    <button class="btn btn-green" onclick="openModal()">вһ• ж–°еўһ</button>
    <input class="search-box" id="search" placeholder="рҹ”Қ жҗңе°Ӣ..." oninput="render()"/>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">в—Җ</button>
      <span id="monthLabel"></span>
      <button onclick="changeMonth(1)">в–¶</button>
    </div>
    <button class="btn-tab active" data-view="board" onclick="switchView(this)">зңӢжқҝ</button>
    <button class="btn-tab" data-view="timeline" onclick="switchView(this)">жҷӮй–“и»ё</button>
    <button class="btn-tab" data-view="report" onclick="switchView(this)">е ұе‘Ҡ</button>
  </div>
</header>
<div class="filter-bar" id="filterBar"></div>
<div class="stats" id="stats"></div>
<div id="boardView" class="board"></div>
<div id="timelineView" class="timeline hidden"></div>
<div id="reportView" class="report hidden"></div>
<div id="addModal" class="modal hidden">
  <div class="modal-content">
    <h3 id="modalTitle">вһ• ж–°еўһд»»еӢҷ</h3>
    <label style="font-size:0.75em;color:var(--muted)">д»»еӢҷеҗҚзЁұ</label>
    <input id="f-name" />
    <label style="font-size:0.75em;color:var(--muted)">иІ иІ¬дәә</label>
    <div style="display:flex;gap:4px"><input id="f-owner" style="flex:1"/><select id="f-owner-select" onchange="onOwnerSelect()" style="width:auto"></select></div>
    <label style="font-size:0.75em;color:var(--muted)">зӢҖж…Ӣ</label>
    <select id="f-status"><option>еҫ…иҫҰ</option><option>йҖІиЎҢдёӯ</option><option>е·Іе®ҢжҲҗ</option></select>
    <label style="font-size:0.75em;color:var(--muted)">е„Әе…Ҳзҙҡ</label>
    <select id="f-priority"><option value="">з„Ўе„Әе…Ҳзҙҡ</option><option value="й«ҳ">й«ҳ</option><option value="дёӯ">дёӯ</option><option value="дҪҺ">дҪҺ</option></select>
    <label style="font-size:0.75em;color:var(--muted)">й–Ӣе§Ӣж—Ҙжңҹ</label>
    <input id="f-start" type="date" style="width:100%" onclick="this.showPicker()" />
    <label style="font-size:0.75em;color:var(--muted)">жҲӘжӯўж—Ҙжңҹ</label>
    <input id="f-due" type="date" style="width:100%" onclick="this.showPicker()" />
    <label style="font-size:0.75em;color:var(--muted)">жЁҷзұӨ</label>
    <div style="display:flex;gap:4px"><input id="f-tags" style="flex:1"/><select id="f-tags-select" onchange="onTagSelect()" style="width:auto"></select></div>
    <label style="font-size:0.75em;color:var(--muted)">зҲ¶д»»еӢҷ</label>
    <div style="display:flex;gap:4px"><input id="f-parent" style="flex:1"/><select id="f-parent-select" onchange="onParentSelect()" style="width:auto"></select></div>
    <label style="font-size:0.75em;color:var(--muted)">еӮҷиЁ»</label>
    <input id="f-note" />
    <div class="modal-actions">
      <button onclick="submitTask()">зўәиӘҚ</button>
      <button onclick="deleteTask()" class="del" id="deleteBtn" style="display:none">еҲӘйҷӨ</button>
      <button onclick="closeModal()" class="cancel">еҸ–ж¶Ҳ</button>
    </div>
  </div>
</div>
<script>
const SHEET_ID='142VCJ65sgkzmELIy6ImUFD8z2RXQRwVs-YvkWnPCF2s';
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbyNevW7oTS-hKWXTkFknvQfVmai9pqlkUXmU9viGTPHDqs261F312cvY_JMEGwOrt_4/exec';
const CSV_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1`;
let tasks=[],currentMonth=new Date(),activeFilter='';
function switchView(el){
  document.querySelectorAll('.btn-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const v=el.dataset.view;
  document.getElementById('boardView').classList.toggle('hidden',v!=='board');
  document.getElementById('timelineView').classList.toggle('hidden',v!=='timeline');
  document.getElementById('reportView').classList.toggle('hidden',v!=='report');
}
function openModal(idx){
  const m=document.getElementById('addModal');m.classList.remove('hidden');
  populateSelects();
  document.getElementById('deleteBtn').style.display=idx!==undefined?'block':'none';
  document.getElementById('modalTitle').textContent=idx!==undefined?'вңҸпёҸ з·ЁијҜд»»еӢҷ':'вһ• ж–°еўһд»»еӢҷ';
  if(idx!==undefined){
    const t=tasks[idx];
    document.getElementById('f-name').value=t['д»»еӢҷеҗҚзЁұ']||'';
    document.getElementById('f-owner').value=t['иІ иІ¬дәә']||'';
    document.getElementById('f-status').value=t['зӢҖж…Ӣ']||'еҫ…иҫҰ';
    document.getElementById('f-priority').value=t['е„Әе…Ҳзҙҡ']||'';
    const sd=t['й–Ӣе§Ӣж—Ҙ']||'';document.getElementById('f-start').value=sd.length>=10?sd.substring(0,10):'';
    const ed=t['жҲӘжӯўж—Ҙ']||'';document.getElementById('f-due').value=ed.length>=10?ed.substring(0,10):'';
    document.getElementById('f-tags').value=t['жЁҷзұӨ']||'';
    document.getElementById('f-parent').value=t['зҲ¶д»»еӢҷ']||'';
    document.getElementById('f-note').value=t['еӮҷиЁ»']||'';
    m.dataset.editIdx=idx;
  }else{
    ['f-name','f-owner','f-tags','f-parent','f-note'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-status').value='еҫ…иҫҰ';document.getElementById('f-priority').value='';document.getElementById('f-start').value='';document.getElementById('f-due').value='';
    delete m.dataset.editIdx;
  }
}
function closeModal(){document.getElementById('addModal').classList.add('hidden')}
function populateSelects(){
  const allTags=new Set();tasks.forEach(t=>(t['жЁҷзұӨ']||'').split(',').filter(Boolean).forEach(tag=>allTags.add(tag.trim())));
  const tagSel=document.getElementById('f-tags-select');
  tagSel.innerHTML='<option value="">йҒёж“Ү...</option>'+[...allTags].map(t=>`<option value="${t}">${t}</option>`).join('')+'<option value="__new">+ ж–°еўһ</option>';
  const parentSel=document.getElementById('f-parent-select');
  const parentNames=[...new Set(tasks.map(t=>t['д»»еӢҷеҗҚзЁұ']).filter(Boolean))];
  parentSel.innerHTML='<option value="">йҒёж“Ү...</option>'+parentNames.map(n=>`<option value="${n}">${n}</option>`).join('')+'<option value="__new">+ ж–°еўһ</option>';
  const ownerSel=document.getElementById('f-owner-select');
  const owners=[...new Set(tasks.map(t=>t['иІ иІ¬дәә']).filter(Boolean))];
  ownerSel.innerHTML='<option value="">йҒёж“Ү...</option>'+owners.map(o=>`<option value="${o}">${o}</option>`).join('')+'<option value="__new">+ ж–°еўһ</option>';
}
function onTagSelect(){
  const sel=document.getElementById('f-tags-select');
  const input=document.getElementById('f-tags');
  if(sel.value==='__new'){const v=prompt('ијёе…Ҙж–°жЁҷзұӨеҗҚзЁұпјҡ');if(v){input.value=input.value?(input.value+','+v):v}sel.value=''}
  else if(sel.value){const cur=input.value?input.value.split(',').map(s=>s.trim()):[];if(!cur.includes(sel.value))cur.push(sel.value);input.value=cur.join(',');sel.value=''}
}
function onParentSelect(){
  const sel=document.getElementById('f-parent-select');
  const input=document.getElementById('f-parent');
  if(sel.value==='__new'){const v=prompt('ијёе…ҘзҲ¶д»»еӢҷеҗҚзЁұпјҡ');if(v)input.value=v;sel.value=''}
  else if(sel.value){input.value=sel.value;sel.value=''}
}
function onOwnerSelect(){
  const sel=document.getElementById('f-owner-select');
  const input=document.getElementById('f-owner');
  if(sel.value==='__new'){const v=prompt('ијёе…Ҙж–°иІ иІ¬дәәеҗҚзЁұпјҡ');if(v)input.value=v;sel.value=''}
  else if(sel.value){input.value=sel.value;sel.value=''}
}
function changeMonth(dir){currentMonth.setMonth(currentMonth.getMonth()+dir);updateMonthLabel();render()}
function updateMonthLabel(){document.getElementById('monthLabel').textContent=currentMonth.getFullYear()+'/'+(currentMonth.getMonth()+1)}
function filterByMonth(list){
  const y=currentMonth.getFullYear(),m=currentMonth.getMonth()+1,prefix=y+'-'+(m<10?'0'+m:m);
  return list.filter(t=>{
    if(!t['й–Ӣе§Ӣж—Ҙ']&&!t['жҲӘжӯўж—Ҙ'])return true;
    if(t['й–Ӣе§Ӣж—Ҙ']&&t['й–Ӣе§Ӣж—Ҙ'].startsWith(prefix))return true;
    if(t['жҲӘжӯўж—Ҙ']&&t['жҲӘжӯўж—Ҙ'].startsWith(prefix))return true;
    if(t['й–Ӣе§Ӣж—Ҙ']&&t['жҲӘжӯўж—Ҙ'])return t['й–Ӣе§Ӣж—Ҙ'].substring(0,7)<=prefix&&t['жҲӘжӯўж—Ҙ'].substring(0,7)>=prefix;
    return false;
  });
}
function getFiltered(){
  let list=filterByMonth(tasks);
  const q=document.getElementById('search').value.toLowerCase();
  if(q)list=list.filter(t=>Object.values(t).join(' ').toLowerCase().includes(q));
  if(activeFilter)list=list.filter(t=>(t['жЁҷзұӨ']||'').includes(activeFilter));
  return list;
}
async function submitTask(){
  const m=document.getElementById('addModal');
  const data={name:document.getElementById('f-name').value,owner:document.getElementById('f-owner').value,status:document.getElementById('f-status').value,progress:'',startDate:document.getElementById('f-start').value,dueDate:document.getElementById('f-due').value,note:document.getElementById('f-note').value,priority:document.getElementById('f-priority').value,tags:document.getElementById('f-tags').value,parent:document.getElementById('f-parent').value};
  if(!data.name){alert('и«ӢеЎ«еҜ«д»»еӢҷеҗҚзЁұ');return}
  if(m.dataset.editIdx!==undefined){data.action='update';data.row=m.dataset.editIdx}
  try{await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(data),mode:'no-cors'});alert('вң… е®ҢжҲҗпјҒ');closeModal();setTimeout(()=>location.reload(),2000)}catch(e){alert('вқҢ еӨұж•—')}
}
async function deleteTask(){
  const m=document.getElementById('addModal');
  if(!confirm('зўәе®ҡеҲӘйҷӨпјҹ'))return;
  try{await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'delete',row:m.dataset.editIdx}),mode:'no-cors'});alert('вң… е·ІеҲӘйҷӨ');closeModal();setTimeout(()=>location.reload(),2000)}catch(e){alert('вқҢ еӨұж•—')}
}
async function fetchData(){
  try{
    const res=await fetch(CSV_URL);const text=await res.text();
    const json=JSON.parse(text.substring(47).slice(0,-2));
    const cols=json.table.cols.map(c=>c.label.trim());
    tasks=json.table.rows.map(r=>{const obj={};cols.forEach((c,i)=>{if(r.c&&r.c[i])obj[c]=r.c[i].f||String(r.c[i].v||'');else obj[c]=''});return obj}).filter(t=>t['д»»еӢҷеҗҚзЁұ']);
    render();renderFilterBar();
  }catch(e){document.getElementById('boardView').innerHTML='<div style="text-align:center;color:var(--muted);padding:40px">з„Ўжі•ијүе…ҘиіҮж–ҷ</div>'}
}
function renderFilterBar(){
  const allTags=new Set();tasks.forEach(t=>(t['жЁҷзұӨ']||'').split(',').filter(Boolean).forEach(tag=>allTags.add(tag.trim())));
  if(!allTags.size){document.getElementById('filterBar').innerHTML='';return}
  let html=`<span class="filter-tag ${!activeFilter?'active':''}" onclick="activeFilter='';render();renderFilterBar()">е…ЁйғЁ</span>`;
  allTags.forEach(tag=>{html+=`<span class="filter-tag ${activeFilter===tag?'active':''}" onclick="activeFilter='${tag}';render();renderFilterBar()">${tag}</span>`});
  document.getElementById('filterBar').innerHTML=html;
}
function render(){renderStats();renderBoard();renderTimeline();renderReport()}
function renderStats(){
  const f=getFiltered(),total=f.length,done=f.filter(t=>t['зӢҖж…Ӣ']==='е·Іе®ҢжҲҗ').length;
  document.getElementById('stats').innerHTML=`<div class="stat"><div class="num">${total}</div><div class="label">д»»еӢҷ</div></div><div class="stat"><div class="num" style="color:var(--green)">${done}</div><div class="label">е®ҢжҲҗ</div></div><div class="stat"><div class="num" style="color:var(--yellow)">${total-done}</div><div class="label">жңӘе®ҢжҲҗ</div></div>`;
}
function renderBoard(){
  const filtered=getFiltered();
  const parentTasks=filtered.filter(t=>!t['зҲ¶д»»еӢҷ']);
  const getChildren=name=>filtered.filter(t=>t['зҲ¶д»»еӢҷ']===name);
  const todo=parentTasks.filter(t=>t['зӢҖж…Ӣ']==='еҫ…иҫҰ');
  const doing=parentTasks.filter(t=>t['зӢҖж…Ӣ']==='йҖІиЎҢдёӯ');
  const done=parentTasks.filter(t=>t['зӢҖж…Ӣ']==='е·Іе®ҢжҲҗ');
  const cardHtml=(items)=>items.map(t=>{
    const idx=tasks.indexOf(t);
    const pClass=t['е„Әе…Ҳзҙҡ']==='й«ҳ'?'p-high':t['е„Әе…Ҳзҙҡ']==='дёӯ'?'p-mid':t['е„Әе…Ҳзҙҡ']==='дҪҺ'?'p-low':'';
    const children=getChildren(t['д»»еӢҷеҗҚзЁұ']);
    const childDone=children.filter(c=>c['зӢҖж…Ӣ']==='е·Іе®ҢжҲҗ').length;
    const tags=(t['жЁҷзұӨ']||'').split(',').filter(Boolean);
    return `<div class="card" onclick="openModal(${idx})" draggable="true" ondragstart="drag(event,${idx})">
      <div class="name">${pClass?'<span class="priority-dot '+pClass+'"></span>':''}${t['д»»еӢҷеҗҚзЁұ']}</div>
      <div class="meta"><span>${t['иІ иІ¬дәә']||''}</span><span>${t['й–Ӣе§Ӣж—Ҙ']?t['й–Ӣе§Ӣж—Ҙ'].substring(0,10):''}${t['й–Ӣе§Ӣж—Ҙ']||t['жҲӘжӯўж—Ҙ']?' ~ ':''}${t['жҲӘжӯўж—Ҙ']?t['жҲӘжӯўж—Ҙ'].substring(0,10):''}</span></div>
      ${tags.length?'<div class="tags">'+tags.map(tg=>'<span class="tag-pill">'+tg.trim()+'</span>').join('')+'</div>':''}
      ${children.length?'<div class="subtasks">еӯҗд»»еӢҷпјҡ'+childDone+'/'+children.length+'<div style="margin-top:4px">'+children.map(c=>{const ci=tasks.indexOf(c);const cpClass=c['е„Әе…Ҳзҙҡ']==='й«ҳ'?'p-high':c['е„Әе…Ҳзҙҡ']==='дёӯ'?'p-mid':c['е„Әе…Ҳзҙҡ']==='дҪҺ'?'p-low':'';return `<div onclick="event.stopPropagation();openModal(${ci})" style="display:flex;align-items:center;gap:4px;padding:3px 0;font-size:0.7em;cursor:pointer;border-bottom:1px solid var(--border)"><span style="color:${c['зӢҖж…Ӣ']==='е·Іе®ҢжҲҗ'?'var(--green)':'var(--muted)'}">${c['зӢҖж…Ӣ']==='е·Іе®ҢжҲҗ'?'вң…':'в¬ң'}</span>${cpClass?'<span class="priority-dot '+cpClass+'"></span>':''}<span style="flex:1">${c['д»»еӢҷеҗҚзЁұ']}</span><span style="color:var(--muted);font-size:0.9em">${c['й–Ӣе§Ӣж—Ҙ']?c['й–Ӣе§Ӣж—Ҙ'].substring(5,10):''}${c['й–Ӣе§Ӣж—Ҙ']||c['жҲӘжӯўж—Ҙ']?'~':''}${c['жҲӘжӯўж—Ҙ']?c['жҲӘжӯўж—Ҙ'].substring(5,10):''}</span></div>`}).join('')+'</div></div>':''}
    </div>`}).join('');
  document.getElementById('boardView').innerHTML=`
    <div class="column" ondragover="event.preventDefault()" ondrop="drop(event,'еҫ…иҫҰ')"><h3 style="color:var(--muted)">рҹ“қ еҫ…иҫҰ (${todo.length})</h3>${cardHtml(todo)}</div>
    <div class="column" ondragover="event.preventDefault()" ondrop="drop(event,'йҖІиЎҢдёӯ')"><h3 style="color:var(--yellow)">рҹ”„ йҖІиЎҢдёӯ (${doing.length})</h3>${cardHtml(doing)}</div>
    <div class="column" ondragover="event.preventDefault()" ondrop="drop(event,'е·Іе®ҢжҲҗ')"><h3 style="color:var(--green)">вң… е·Іе®ҢжҲҗ (${done.length})</h3>${cardHtml(done)}</div>`;
}
let dragIdx=null;
function drag(e,idx){dragIdx=idx;e.dataTransfer.effectAllowed='move'}
function drop(e,status){
  e.preventDefault();if(dragIdx===null)return;
  const t=tasks[dragIdx];
  const data={action:'update',row:dragIdx,name:t['д»»еӢҷеҗҚзЁұ'],owner:t['иІ иІ¬дәә'],status:status,progress:'',startDate:t['й–Ӣе§Ӣж—Ҙ'],dueDate:t['жҲӘжӯўж—Ҙ'],note:t['еӮҷиЁ»'],priority:t['е„Әе…Ҳзҙҡ'],tags:t['жЁҷзұӨ'],parent:t['зҲ¶д»»еӢҷ']};
  fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(data),mode:'no-cors'});
  t['зӢҖж…Ӣ']=status;render();dragIdx=null;
}
function renderTimeline(){
  const filtered=getFiltered();
  if(!filtered.length){document.getElementById('timelineView').innerHTML='<div style="text-align:center;color:var(--muted);padding:40px">жң¬жңҲз„Ўд»»еӢҷ</div>';return}
  const y=currentMonth.getFullYear(),m=currentMonth.getMonth();
  const days=new Date(y,m+1,0).getDate();
  let h='<div style="display:flex;border-bottom:1px solid var(--border);padding:4px 0;margin-bottom:6px"><div style="width:130px;flex-shrink:0;font-size:0.65em;color:var(--muted)">д»»еӢҷ</div><div style="flex:1;display:flex">';
  for(let d=1;d<=days;d++)h+=`<div style="flex:1;text-align:center;font-size:0.55em;color:var(--muted)">${d}</div>`;
  h+='</div></div>';
  filtered.forEach(t=>{
    const s=t['й–Ӣе§Ӣж—Ҙ']?new Date(t['й–Ӣе§Ӣж—Ҙ']):new Date(y,m,1),e=t['жҲӘжӯўж—Ҙ']?new Date(t['жҲӘжӯўж—Ҙ']):new Date(y,m,days);
    let sd=s.getMonth()===m&&s.getFullYear()===y?s.getDate():1;
    let ed=e.getMonth()===m&&e.getFullYear()===y?e.getDate():days;
    const color=t['зӢҖж…Ӣ']==='е·Іе®ҢжҲҗ'?'var(--green)':t['зӢҖж…Ӣ']==='йҖІиЎҢдёӯ'?'var(--yellow)':'var(--muted)';
    const l=((sd-1)/days*100).toFixed(1),w=((ed-sd+1)/days*100).toFixed(1);
    const pClass=t['е„Әе…Ҳзҙҡ']==='й«ҳ'?'p-high':t['е„Әе…Ҳзҙҡ']==='дёӯ'?'p-mid':'';
    h+=`<div style="display:flex;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)"><div style="width:130px;flex-shrink:0;font-size:0.7em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${pClass?'<span class="priority-dot '+pClass+'"></span>':''}${t['д»»еӢҷеҗҚзЁұ']}</div><div style="flex:1;position:relative;height:18px;background:var(--bg);border-radius:3px"><div style="position:absolute;left:${l}%;width:${w}%;height:100%;background:${color};border-radius:3px;opacity:0.8"></div></div></div>`;
  });
  document.getElementById('timelineView').innerHTML=h;
}
function renderReport(){
  const filtered=getFiltered(),total=filtered.length,done=filtered.filter(t=>t['зӢҖж…Ӣ']==='е·Іе®ҢжҲҗ').length;
  const today=new Date().toISOString().split('T')[0];
  const overdue=filtered.filter(t=>t['зӢҖж…Ӣ']!=='е·Іе®ҢжҲҗ'&&t['жҲӘжӯўж—Ҙ']&&t['жҲӘжӯўж—Ҙ']<today);
  let html=`<div class="report-section"><h3>рҹ“Ҡ ж•ҙй«”йҖІеәҰ</h3><p>е®ҢжҲҗзҺҮпјҡ${total?Math.round(done/total*100):0}%пјҲ${done}/${total}пјү</p></div>`;
  const ownerMap={};filtered.forEach(t=>{const o=t['иІ иІ¬дәә']||'жңӘжҢҮжҙҫ';if(!ownerMap[o])ownerMap[o]={total:0,done:0,doing:0,todo:0};ownerMap[o].total++;if(t['зӢҖж…Ӣ']==='е·Іе®ҢжҲҗ')ownerMap[o].done++;else if(t['зӢҖж…Ӣ']==='йҖІиЎҢдёӯ')ownerMap[o].doing++;else ownerMap[o].todo++});
  if(Object.keys(ownerMap).length){html+=`<div class="report-section"><h3>рҹ‘Ө еҗ„иІ иІ¬дәәе·ҘдҪңж•ёйҮҸ</h3>`;Object.entries(ownerMap).forEach(([n,d])=>{html+=`<p style="margin-bottom:4px">вҖў <strong>${n}</strong>пјҡе…ұ${d.total}й …пјҲеҫ…иҫҰ${d.todo}/йҖІиЎҢдёӯ${d.doing}/е®ҢжҲҗ${d.done}пјү</p>`});html+=`</div>`}
  if(overdue.length)html+=`<div class="report-section"><h3>вҡ пёҸ йҖҫжңҹд»»еӢҷ</h3>${overdue.map(t=>`<p class="overdue">вҖў ${t['д»»еӢҷеҗҚзЁұ']}пјҲжҲӘжӯўпјҡ${t['жҲӘжӯўж—Ҙ']}пјү</p>`).join('')}</div>`;
  document.getElementById('reportView').innerHTML=html;
}
fetchData();updateMonthLabel();
</script>
